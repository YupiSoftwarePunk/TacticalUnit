name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Client/package-lock.json'

      - name: Install dependencies
        working-directory: Client 
        run: npm install

      - name: TypeScript type checking
        working-directory: Client
        run: npx tsc --noEmit

      - name: Run ESLint
        working-directory: Client
        run: npm run lint

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Client/package-lock.json'

      - name: Install dependencies
        working-directory: Client
        run: npm ci

      - name: Build project
        working-directory: Client
        run: npm run dev

      - name: Upload build artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: Client/.next/  
          retention-days: 5