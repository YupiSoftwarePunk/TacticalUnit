name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Client/package-lock.json'

      - name: Install dependencies
        working-directory: Client 
        run: npm ci

      - name: TypeScript type checking
        working-directory: Client
        run: npx tsc --noEmit

      - name: Build project
        working-directory: Client
        run: npm run build