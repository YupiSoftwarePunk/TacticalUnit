name: project CI

on:
  push:
    branches: [ "main" ]
    
jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Client/package-lock.json'

      - name: Print push message
        run: echo "Push detected! Starting the build process..."

      - name: Install dependencies
        working-directory: Client
        run: npm ci

      - name: Build project
        working-directory: Client
        run: npm run build
        
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Client/package-lock.json'

      - name: Install dependencies
        working-directory: Client
        run: npm ci

      - name: Run tests (Template)
        working-directory: Client
        run: npm test || echo "Tests are currently missing, but everything works!"
